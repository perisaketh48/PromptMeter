# Netlify configuration for the AI Token & Cost Intelligence frontend.
# Builds the Vite SPA and proxies /api/ to the deployed Django backend.

[build]
  base    = "frontend"
  publish = "frontend/dist"
  command = "npm ci && npm run build"

[build.environment]
  NODE_VERSION = "20"
  # `VITE_API_BASE_URL` and `VITE_API_PROXY_TARGET` should be set in Netlify's
  # site environment, not here. See backend/.env.example for sister variables.

# Proxy /api/* to the live backend. Set BACKEND_URL in Netlify env or hard-code
# the production URL below before deploying.
[[redirects]]
  from = "/api/*"
  to = "https://YOUR-BACKEND.example.com/api/:splat"
  status = 200
  force = true

# SPA fallback — every other path falls through to index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options       = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy       = "same-origin"
